body {
  margin: 0;
  font-family: "Segoe UI", Arial, sans-serif;
  background:
    radial-gradient(circle at top left, #1e3a8a, transparent 30%),
    radial-gradient(circle at bottom right, #7c2d12, transparent 25%),
    #0f172a;
  color: #e5e7eb;
}

.contenedor {
  max-width: 1200px;
  margin: auto;
  padding: 40px;
}

h1 {
  font-size: 42px;
  margin-bottom: 5px;
}

.subtitulo {
  color: #cbd5e1;
  margin-bottom: 30px;
}

.tarjeta {
  background: rgba(15, 23, 42, 0.85);
  border: 1px solid rgba(148, 163, 184, 0.25);
  padding: 28px;
  border-radius: 22px;
  margin-top: 24px;
  box-shadow: 0 20px 45px rgba(0, 0, 0, 0.35);
  backdrop-filter: blur(12px);
}

.panel-carga {
  display: flex;
  justify-content: space-between;
  gap: 20px;
  align-items: center;
  flex-wrap: wrap;
}

.grupo-botones {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
}

input[type="file"] {
  background: #1e293b;
  padding: 14px;
  border-radius: 12px;
  border: 1px dashed #60a5fa;
  color: #e5e7eb;
}

button {
  background: linear-gradient(135deg, #2563eb, #9333ea);
  color: white;
  border: none;
  padding: 14px 24px;
  border-radius: 14px;
  cursor: pointer;
  font-weight: bold;
  transition: 0.2s;
}

button:hover {
  transform: translateY(-2px);
  box-shadow: 0 10px 25px rgba(37, 99, 235, 0.4);
}

button:disabled {
  opacity: 0.6;
  cursor: not-allowed;
}

.btn-limpiar {
  background: linear-gradient(135deg, #dc2626, #f97316);
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 20px;
  margin-top: 24px;
}

.card-resumen {
  background: linear-gradient(135deg, #1e293b, #111827);
  padding: 24px;
  border-radius: 20px;
  text-align: center;
  border: 1px solid rgba(148, 163, 184, 0.2);
  box-shadow: 0 14px 30px rgba(0, 0, 0, 0.3);
}

.card-resumen h3 {
  margin: 0;
  color: #cbd5e1;
  font-size: 15px;
}

.card-resumen p {
  font-size: 38px;
  font-weight: bold;
  margin: 12px 0 0;
  background: linear-gradient(135deg, #60a5fa, #c084fc);
  -webkit-background-clip: text;
  color: transparent;
}

.contenedor-graficas {
  display: grid;
  grid-template-columns: 1fr;
  gap: 24px;
}

.recharts-wrapper text {
  fill: #e5e7eb;
}

.tabla {
  width: 100%;
  border-collapse: collapse;
  margin-top: 15px;
}

.tabla th,
.tabla td {
  padding: 14px;
  border-bottom: 1px solid rgba(148, 163, 184, 0.2);
  text-align: left;
}

.tabla th {
  color: #93c5fd;
}

.badge {
  background: #1e40af;
  padding: 6px 10px;
  border-radius: 999px;
  font-size: 13px;
}

.fila-total {
  font-weight: bold;
  color: #93c5fd;
  background: rgba(37, 99, 235, 0.15);
}